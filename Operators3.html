<script>
    console.log ( " Relational or Comparison Operators:-   <  >  ==  <=  >=  != " ) ;
    console.log (" Result comes in Boolean i-e. True or False ") ;
    var x = 100;
    var y = 10;
    console.log (x==y ) ;
    // Now start an if-else conditional statement

    if(x==y) {
console.log("EQUAL") ;
    }

    else {"FALSE"} ;

    if(x<=y) {
console.log("LESS THAN OR EQUAL TO") ;
    }
 else {"NOR LESS THAN NOR EQUAL TO"} ;

 //Similarly we can use other Relational Operators in an if-else conditional statement

</script>
