<html>
<head>
 <title>OPR</title>
</head>
<body>

    <script>
      console.log(" Logical Operators:- | (OR)   & (AND)   !(NOT) ") 

var x = 10 ;
var y = 20 ;
var z = 30 ;

if(x < y  |  y > z ) {
    console.log(" OR is used here ") ;
    // HERE 'y' is less than 'z' but (OR) | lets it to execute the code even if only one condition is true.
}
if (x < y  &  y < z ) {
console.log (" AND is used here ") ;
// HERE 'y' is less than 'z' , ALso (AND) & won't let it to execute the code if only one condition is true.

}

    </script>

</body>
</html>
